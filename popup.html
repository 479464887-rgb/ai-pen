<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:#c9d1d9;background:#0d1117;width:300px;padding:16px}
h1{font-size:15px;color:#58a6ff;margin-bottom:12px}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:6px}
.badge-pro{background:#f0c040;color:#0d1117}
.badge-free{background:#30363d;color:#8b949e}
.stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #21262d}
.btn{display:block;width:100%;padding:8px;text-align:center;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:6px;cursor:pointer;background:#21262d;color:#c9d1d9;margin-top:8px}
.btn:hover{background:#30363d}
.btn-pro{background:#f0c040;color:#0d1117;border-color:#f0c040}
.btn-pro:hover{background:#ffd700}
</style></head><body>
<h1>✏️ AI Pen<span id="badge"></span></h1>
<div id="pro-banner" style="display:none;background:linear-gradient(135deg,#f0c04020,#daa52020);border:1px solid #f0c04040;border-radius:8px;padding:10px;margin-bottom:8px;text-align:center">
  <div style="font-size:14px;font-weight:600;color:#f0c040;margin-bottom:4px">🚀 Pro 无限畅用</div>
  <div style="font-size:11px;color:#8b949e">无限次数 · 优先响应</div>
</div>
<div class="stat"><span>今日已用</span><span id="count">-</span></div>
<div class="stat"><span>总计</span><span id="total">-</span></div>
<button class="btn btn-pro" id="upgrade" style="display:none">✨ 升级 Pro</button>
<button class="btn" id="settings">⚙️ 设置 API Key</button>
<button class="btn" id="login-btn" style="display:none">🔑 已购买？登录激活</button>
<p style="margin-top:8px;font-size:11px;color:#8b949e;text-align:center">选中任意文字 → AI 改写/翻译/总结</p>
<script src="popup.js"></script>
</body></html>
