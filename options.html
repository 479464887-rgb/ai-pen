<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>AI Pen · 设置</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:#c9d1d9;background:#0d1117;max-width:500px;margin:40px auto;padding:0 20px}
h1{font-size:22px;color:#58a6ff;margin-bottom:24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:20px}
.card h2{font-size:15px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;margin-bottom:4px;font-size:13px}
.field .hint{font-size:12px;color:#8b949e;margin-bottom:4px}
.field input{width:100%;padding:8px 12px;font-size:13px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9}
.field input:focus{outline:none;border-color:#58a6ff}
.btn{padding:8px 20px;font-size:14px;font-weight:600;border-radius:6px;cursor:pointer;border:none;background:#238636;color:#fff}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.65}
#status{margin-left:12px;font-size:13px;color:#3fb950;display:none}
</style></head><body>
<h1>✏️ AI Pen 设置</h1>
<div class="card">
  <h2>API 配置</h2>
  <div class="field">
    <label>DeepSeek API Key</label>
    <div class="hint">从 platform.deepseek.com 获取。~¥0.002/次调用。</div>
    <input type="password" id="key" placeholder="sk-..." autocomplete="off">
  </div>
</div>
<div class="card">
  <h2>使用限制</h2>
  <div class="field">
    <label>每日免费次数</label>
    <input type="number" id="limit" min="1" max="100" value="20">
  </div>
</div>
<div class="card">
  <button class="btn" id="save">保存设置</button>
  <span id="status"></span>
</div>
<script src="options.js"></script>
</body></html>
